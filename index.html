<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖音广告开户 AI 助手 - 智能咨询，极速开户</title>
    <meta name="description" content="AI 智能引导抖音广告开户，在线解答政策、指导准备资料、对接官方代理商。">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 2rem;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00F2EA, #FE2C55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Chat Panel Full Width */
        .chat-panel-wrapper {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            padding-top: 2rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #00F2EA;
        }
        
        /* Main Container */
        .main-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem 2rem;
            min-height: 100vh;
        }

        /* Left Content */
        .left-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 3rem;
            text-align: left;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(0, 242, 234, 0.1);
            border: 1px solid rgba(0, 242, 234, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #00F2EA;
            margin-bottom: 1.5rem;
            width: fit-content;
        }

        h1 {
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-description {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        .trust-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 3rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00F2EA, #FE2C55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 0.5rem;
        }

        /* Chat Container */
        .chat-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .chat-header {
            padding: 1.5rem;
            background: rgba(0, 242, 234, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .bot-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00F2EA, #FE2C55);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .bot-info h3 {
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .bot-status {
            font-size: 0.85rem;
            color: #00C853;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .bot-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00C853;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .chat-message {
            display: flex;
            gap: 1rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .chat-message.user .message-avatar {
            background: linear-gradient(135deg, #00F2EA, #FE2C55);
        }

        .message-content {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem 1.25rem;
            border-radius: 16px;
            max-width: 80%;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .chat-message.user .message-content {
            background: linear-gradient(135deg, #00F2EA, #FE2C55);
            color: #000;
        }

        .message-content ul, .message-content ol {
            margin: 0.5rem 0 0.5rem 1.5rem;
        }

        .message-content li {
            margin-bottom: 0.25rem;
        }

        .chat-input-container {
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .quick-questions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .quick-question {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 234, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-question:hover {
            background: rgba(0, 242, 234, 0.1);
            border-color: #00F2EA;
        }

        .input-wrapper {
            display: flex;
            gap: 0.75rem;
        }

        #chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 1rem 1.25rem;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #chat-input:focus {
            border-color: #00F2EA;
        }

        #chat-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .chat-send-btn {
            background: linear-gradient(135deg, #00F2EA, #FE2C55);
            color: #fff;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.3s, transform 0.2s;
        }

        .chat-send-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading */
        .loading-dots {
            display: flex;
            gap: 0.25rem;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Mobile */
        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
                padding-top: 6rem;
            }

            .left-content {
                text-align: center;
                padding: 2rem 1rem;
            }

            .trust-stats {
                justify-content: center;
            }

            .chat-container {
                height: 70vh;
                max-width: 100%;
            }

            h1 {
                font-size: 2.5rem;
            }
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-content">
            <div class="logo">TikTok AI 助手</div>
            <div class="nav-links">
                <a href="#" onclick="scrollToChat()">开始咨询</a>
                <a href="#features">服务优势</a>
                <a href="#faq">常见问题</a>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Left Content -->
        <div class="left-content">
            <div class="hero-badge">🚀 官方认证代理商</div>
            <h1>抖音广告开户<br>从未如此简单</h1>
            <p class="hero-description">
                AI 智能助手 24 小时在线，为您解答开户政策、指导资料准备、<br>
                对接官方认证代理商。平均 24 小时极速审核，让您快速开启广告投放。
            </p>
            
            <div class="trust-stats">
                <div class="stat-item">
                    <div class="stat-number">1000+</div>
                    <div class="stat-label">成功案例</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">24h</div>
                    <div class="stat-label">极速审核</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">7×24</div>
                    <div class="stat-label">小时服务</div>
                </div>
            </div>
        </div>

        <!-- Chat Container -->
        <div class="chat-panel-wrapper">
            <div class="chat-container" id="chat-panel">
            <div class="chat-header">
                <div class="bot-avatar">🤖</div>
                <div class="bot-info">
                    <h3>抖音广告开户助手</h3>
                    <div class="bot-status">在线</div>
                </div>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                <div class="chat-message bot">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        您好！我是抖音广告开户助手，可以帮您：
                        <br><br>
                        • 解答开户政策和流程
                        <br>
                        • 指导准备资质材料
                        <br>
                        • 对接官方认证代理商
                        <br><br>
                        有什么可以帮您？😊
                    </div>
                </div>
            </div>
            
            <div class="chat-input-container">
                <div class="quick-questions">
                    <span class="quick-question" onclick="quickAsk('开户需要什么资料？')">开户资料</span>
                    <span class="quick-question" onclick="quickAsk('费用是多少？')">开户费用</span>
                    <span class="quick-question" onclick="quickAsk('多久可以下户？')">下户时间</span>
                    <span class="quick-question" onclick="quickAsk('哪些行业不能投放？')">禁投行业</span>
                </div>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="chat-input" 
                        placeholder="输入您的问题..." 
                        onkeypress="handleKeyPress(event)"
                    >
                    <button class="chat-send-btn" onclick="handleSend()" id="send-btn">发送</button>
                </div>
            </div>
        </div>
            </div>
        </div>
    </div>

    <script>
        // Coze API 配置
        const COZE_BOT_ID = '7607292705848590377';
        const COZE_PAT_TOKEN = 'pat_Hbl6GRhdFDFMdDrOH4gWe0ZxzVoafR1Sp7taSvNwR3ek2yOgMKTCeM3dYN0bVgaA';
        const COZE_API_URL = 'https://api.coze.cn/v3/chat';
        
        // 对话历史（用于上下文）
        let conversationId = null;
        let isProcessing = false;
        
        // 滚动到聊天窗口
        function scrollToChat() {
            document.getElementById('chat-panel').scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => {
                document.getElementById('chat-input').focus();
            }, 500);
        }
        
        // 轮询对话状态直到完成
        async function pollChatStatus(chatId, convId, maxAttempts = 60) {
            for (let i = 0; i < maxAttempts; i++) {
                await new Promise(resolve => setTimeout(resolve, 500));
                
                const response = await fetch(
                    `https://api.coze.cn/v3/chat/retrieve?chat_id=${chatId}&conversation_id=${convId}`,
                    {
                        headers: {
                            'Authorization': `Bearer ${COZE_PAT_TOKEN}`
                        }
                    }
                );
                
                const data = await response.json();
                const status = data.data?.status;
                
                if (i % 10 === 0) {
                    console.log(`轮询 ${i+1}: status=${status}`);
                }
                
                if (status === 'completed') {
                    console.log(`轮询 ${i+1}: 完成！`);
                    return data.data;
                }
                if (status === 'failed' || status === 'canceled') {
                    throw new Error('对话处理失败：' + status);
                }
            }
            throw new Error('等待超时（30 秒）');
        }
        
        // 获取对话消息 - 过滤内部格式
        async function getChatMessages(chatId, convId) {
            const response = await fetch(
                `https://api.coze.cn/v3/chat/message/list?conversation_id=${convId}&chat_id=${chatId}`,
                {
                    headers: {
                        'Authorization': `Bearer ${COZE_PAT_TOKEN}`
                    }
                }
            );
            
            const data = await response.json();
            console.log('获取消息响应:', data);
            
            // 过滤消息：只保留普通文本内容，排除内部格式
            const messages = data.data || [];
            const validMessages = messages.filter(msg => {
                // 排除内部格式消息
                if (msg.msg_type && msg.msg_type !== 'text') {
                    return false;
                }
                // 排除空内容
                if (!msg.content || msg.content.trim() === '') {
                    return false;
                }
                // 排除包含内部标记的消息
                if (msg.content.includes('time_capsule_recall') || 
                    msg.content.includes('wraped_text') ||
                    msg.content.includes('connector_iD') ||
                    msg.content.includes('memory_id')) {
                    return false;
                }
                return true;
            });
            
            console.log('过滤后的消息:', validMessages);
            return validMessages;
        }
        
        // 发送消息到 Coze
        async function sendMessage(message) {
            try {
                // Step 1: 发起对话
                const response = await fetch(COZE_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${COZE_PAT_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        bot_id: COZE_BOT_ID,
                        user_id: 'website_visitor',
                        conversation_id: conversationId || undefined,
                        additional_messages: [{
                            role: 'user',
                            content: message,
                            content_type: 'text'
                        }],
                        stream: false,
                        auto_save_history: true
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Coze API Error Response:', errorText);
                    throw new Error('API 请求失败：' + response.status);
                }
                
                const data = await response.json();
                console.log('Step 1 - 发起对话:', data);
                
                if (!data.data || !data.data.id || !data.data.conversation_id) {
                    throw new Error('API 返回数据格式错误');
                }
                
                const chatId = data.data.id;
                conversationId = data.data.conversation_id;
                
                // Step 2: 轮询直到完成
                await pollChatStatus(chatId, conversationId);
                
                // Step 3: 获取消息
                const messages = await getChatMessages(chatId, conversationId);
                
                // 提取 AI 回复（优先取 type="answer" 的消息）
                if (messages.length > 0) {
                    // 先找 type="answer" 的消息（主要回复）
                    const answerMsg = messages.find(msg => msg.type === 'answer');
                    if (answerMsg && answerMsg.content) {
                        return answerMsg.content;
                    }
                    // 否则取最后一条有效消息
                    const lastMsg = messages[messages.length - 1];
                    return lastMsg.content;
                }
                
                return '抱歉，我暂时无法回答这个问题。';
            } catch (error) {
                console.error('Coze API Error:', error);
                throw error;
            }
        }
        
        // 添加消息到聊天窗口
        function appendMessage(content, isUser = false) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${isUser ? 'user' : 'bot'}`;
            
            const avatar = isUser ? '👤' : '🤖';
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">${formatContent(content)}</div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // 格式化内容（支持简单的 markdown）
        function formatContent(content) {
            if (!content) return '';
            
            // 转义 HTML
            content = content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // 换行
            content = content.replace(/\n/g, '<br>');
            
            // 列表
            content = content.replace(/^•\s+/gm, '&bull; ');
            content = content.replace(/^\d+\.\s+/gm, (match) => {
                const num = match.replace('. ', '');
                return `${num}. `;
            });
            
            // 加粗
            content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            return content;
        }
        
        // 显示加载动画
        function showLoading() {
            const messagesContainer = document.getElementById('chat-messages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'chat-message bot loading';
            loadingDiv.id = 'loading-message';
            loadingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="loading-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(loadingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // 移除加载动画
        function hideLoading() {
            const loadingDiv = document.getElementById('loading-message');
            if (loadingDiv) {
                loadingDiv.remove();
            }
        }
        
        // 处理发送
        async function handleSend() {
            if (isProcessing) return;
            
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            appendMessage(message, true);
            input.value = '';
            
            // 禁用发送按钮
            isProcessing = true;
            document.getElementById('send-btn').disabled = true;
            
            // 显示加载动画
            showLoading();
            
            try {
                // 发送消息到 Coze
                const reply = await sendMessage(message);
                
                // 移除加载动画
                hideLoading();
                
                // 显示 AI 回复
                appendMessage(reply, false);
                
            } catch (error) {
                hideLoading();
                appendMessage('抱歉，连接失败了，请稍后再试。', false);
                console.error('Chat Error:', error);
            } finally {
                isProcessing = false;
                document.getElementById('send-btn').disabled = false;
                input.focus();
            }
        }
        
        // 快捷提问
        function quickAsk(question) {
            if (isProcessing) return;
            document.getElementById('chat-input').value = question;
            handleSend();
        }
        
        // 监听回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                handleSend();
            }
        }
    </script>
</body>
</html>
